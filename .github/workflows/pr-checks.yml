name: PR Checks

# Runs on every PR (including the ones the nightly auto-fix opens, provided that
# PR was created with a PAT — see .github/AUTOMATION.md).
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  models: read   # Llama + Mistral review via free GitHub Models

jobs:
  test:
    name: Test branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Get dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Unit tests
        run: |
          if [ -d test ]; then
            flutter test
          else
            echo "No test/ directory — skipping."
          fi

  review:
    name: Multi-AI review
    runs-on: ubuntu-latest
    needs: test                        # wait for Test branch to finish first
    if: success() && github.event_name == 'pull_request'
    # success() means: only run if tests PASSED.
    # No point reviewing broken code — the fix should make tests green first.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review PR (Llama + Mistral + Gemini + Groq)
        # Posts independent review comments from each available free AI service.
        # Llama + Mistral via GitHub Models are always active (built-in token).
        # Gemini and Groq activate automatically when their secrets are added.
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          # COPILOT_PAT: PAT from your Copilot-enabled account (can be a different account).
          # Create a classic PAT at https://github.com/settings/tokens and add as repo secret.
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 .github/scripts/multi_ai_review.py

  notify:
    name: Notify result
    needs: [test, review]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Telegram notification
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_RESULT: ${{ needs.test.result }}
          REVIEW_RESULT: ${{ needs.review.result }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            echo "Telegram secrets not set — skipping notification."
            exit 0
          fi
          if [ "$TEST_RESULT" = "success" ]; then
            status="✅ Tests PASSED"
          else
            status="❌ Tests FAILED ($TEST_RESULT)"
          fi
          text="$status%0AReview: $REVIEW_RESULT%0A${PR_TITLE}%0A${PR_URL}"
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            --data-urlencode "text=${text}" >/dev/null
          echo "Notification sent."
